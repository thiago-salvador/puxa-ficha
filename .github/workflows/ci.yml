name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate app
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - run: npm run check:scripts
      - run: npm test
      - run: npm run lint
      - run: npm run build
