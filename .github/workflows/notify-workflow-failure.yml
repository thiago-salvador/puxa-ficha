name: Notificar falha de workflow

on:
  workflow_run:
    workflows:
      - Ingestao de dados
      - Auditoria factual
      - Auditoria de completude
      - Monitoramento de producao
    types:
      - completed

jobs:
  email-on-failure:
    name: Email de falha
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Enviar email
        if: >-
          env.SMTP_HOST != '' &&
          env.SMTP_PORT != '' &&
          env.SMTP_USERNAME != '' &&
          env.SMTP_PASSWORD != '' &&
          env.SMTP_FROM != ''
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Puxa Ficha] Falha no workflow ${{ github.event.workflow_run.name }}"
          to: contato.thiagosalvador@gmail.com
          from: ${{ secrets.SMTP_FROM }}
          secure: true
          body: |
            Workflow: ${{ github.event.workflow_run.name }}
            Conclusao: ${{ github.event.workflow_run.conclusion }}
            Branch: ${{ github.event.workflow_run.head_branch }}
            Evento: ${{ github.event.workflow_run.event }}
            Commit: ${{ github.event.workflow_run.head_sha }}
            Autor: ${{ github.event.workflow_run.actor.login }}
            URL: ${{ github.event.workflow_run.html_url }}

            Secrets necessarios neste workflow:
            SMTP_HOST
            SMTP_PORT
            SMTP_USERNAME
            SMTP_PASSWORD
            SMTP_FROM
