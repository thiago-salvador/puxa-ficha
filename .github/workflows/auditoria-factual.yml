name: Auditoria factual

on:
  schedule:
    - cron: "0 9 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/auditoria-factual.yml"
      - "scripts/audit-factual.ts"
      - "scripts/audit-factual-diff.ts"
      - "scripts/check-audit-gate.ts"
      - "scripts/release-verify.ts"
      - "scripts/set-publicavel-from-audit.ts"
      - "scripts/sync-audit-assertions.ts"
      - "scripts/sync-mock-from-assertions.ts"
      - "scripts/lib/audit-*.ts"
      - "scripts/lib/canonical-person-map.ts"
      - "scripts/lib/factual-assertions.ts"
      - "scripts/lib/party-canonical.ts"
      - "scripts/schema.sql"
      - "src/data/mock.ts"
      - "src/app/candidato/[slug]/page.tsx"
      - "src/app/preview/candidato/[slug]/page.tsx"
      - "src/app/comparar/page.tsx"
      - "src/app/explorar/page.tsx"
      - "src/components/CandidatoProfile.tsx"
      - "src/components/CandidatoProfileSections.tsx"
      - "src/components/CandidatoSlider.tsx"
      - "src/components/ComparadorPanel.tsx"
      - "src/components/DataFreshnessNotice.tsx"
      - "src/lib/api.ts"
      - "src/lib/candidate-integrity.ts"
      - "src/lib/supabase.ts"
      - "src/lib/types.ts"
      - "data/candidatos.json"
      - "package.json"
      - "package-lock.json"
      - "supabase/migrations/**"
  pull_request:
    branches:
      - main
    paths:
      - "scripts/**"
      - "src/lib/api.ts"
      - "src/lib/candidate-integrity.ts"
      - "src/lib/supabase.ts"
      - "src/data/mock.ts"
      - "src/app/candidato/[slug]/page.tsx"
      - "src/app/preview/candidato/[slug]/page.tsx"
      - "src/app/comparar/page.tsx"
      - "src/app/explorar/page.tsx"
      - "src/components/CandidatoProfile.tsx"
      - "src/components/CandidatoProfileSections.tsx"
      - "src/components/CandidatoSlider.tsx"
      - "src/components/ComparadorPanel.tsx"
      - "src/components/DataFreshnessNotice.tsx"
      - "src/lib/types.ts"
      - "data/candidatos.json"
      - "package.json"
      - "package-lock.json"
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  # Full gate: runs on push to main and internal PRs (secrets available)
  audit-full:
    name: Gate factual 144/144
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip for PRs from forks (no secrets)
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PF_PREVIEW_TOKEN: ci-preview

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Rodar auditoria factual 144/144
        run: npx tsx scripts/audit-factual.ts

      - name: Gate de publicacao
        run: npx tsx scripts/check-audit-gate.ts --max-blocked 0 --min-assertions 144 --min-curated auto

      - name: Build da app para verifier
        run: npm run build

      - name: Subir app local para release verify
        run: |
          PORT=3000 npm run start > /tmp/puxa-ficha-start.log 2>&1 &
          echo $! > /tmp/puxa-ficha-start.pid
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/explorar > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/puxa-ficha-start.log
          exit 1

      - name: Release verify parcial
        run: VERIFY_URL=http://127.0.0.1:3000 npm run audit:release-verify:partial

      - name: Sincronizar publicavel no banco
        if: github.event_name == 'push'
        run: npx tsx scripts/set-publicavel-from-audit.ts

      - name: Encerrar app local
        if: always()
        run: |
          if [ -f /tmp/puxa-ficha-start.pid ]; then
            kill "$(cat /tmp/puxa-ficha-start.pid)" || true
          fi

      - name: Publicar artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auditoria-factual
          path: |
            scripts/audit-factual-report.json
            scripts/audit-factual-queue.json
            scripts/audit-factual-summary.md
            scripts/audit-factual-state.json
            scripts/audit-factual-history.json
            scripts/release-verify-report.json
            scripts/release-verify-summary.md
            /tmp/puxa-ficha-start.log

  # Lightweight check for fork PRs (no secrets needed)
  audit-typecheck:
    name: Type check (fork-safe)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Type check scripts
        run: npm run check:scripts
